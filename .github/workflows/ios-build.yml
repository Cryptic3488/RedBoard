name: iOS Build & TestFlight

on:
  workflow_dispatch:  # Manual trigger — run from GitHub Actions tab
  # push:
  #   branches: [main]  # Uncomment after first successful manual build

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      # ── Code signing ────────────────────────────────────────────────────────

      - name: Setup build keychain
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Import distribution certificate
        run: |
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "${{ secrets.IOS_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Download provisioning profile
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: com.arborik.redboard
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      # ── Build ────────────────────────────────────────────────────────────────

      - name: Archive
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            archive

      - name: Export IPA
        run: |
          # Inject team ID into ExportOptions at build time
          sed -i '' "s/REPLACE_WITH_TEAM_ID/${{ secrets.APPLE_TEAM_ID }}/" ios/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ios/ExportOptions.plist

      # ── Upload ───────────────────────────────────────────────────────────────

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "${{ secrets.APPSTORE_API_PRIVATE_KEY }}" \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/App.ipa" \
            --apiKey "${{ secrets.APPSTORE_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPSTORE_API_ISSUER_ID }}" \
            --apiPrivateKeyPath \
              ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8 \
            --verbose
