<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notifications</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

  <div class="max-w-2xl mx-auto space-y-8">

    <h1 class="text-3xl font-bold text-gray-800">Notification Center</h1>

    <!-- Individual Message -->
    <div class="bg-white rounded-2xl shadow p-6 space-y-4">
      <h2 class="text-xl font-semibold text-gray-700">Send to Individual</h2>
      <input id="userId"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
        type="text" placeholder="User ID e.g. user_123" />
      <input id="userTitle"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
        type="text" placeholder="Title" />
      <input id="userBody"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
        type="text" placeholder="Message" />
      <button onclick="sendToUser()"
        class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition">
        Send to User
      </button>
    </div>

    <!-- Group Message -->
    <div class="bg-white rounded-2xl shadow p-6 space-y-4">
      <h2 class="text-xl font-semibold text-gray-700">Send to Group</h2>
      <select id="groupId"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400">
        <option value="admins">Admins</option>
        <option value="team-a">Team A</option>
        <option value="team-b">Team B</option>
      </select>
      <input id="groupTitle"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400"
        type="text" placeholder="Title" />
      <input id="groupBody"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400"
        type="text" placeholder="Message" />
      <button onclick="sendToGroup()"
        class="w-full bg-purple-500 hover:bg-purple-600 text-white font-semibold py-2 rounded-lg transition">
        Send to Group
      </button>
    </div>

    <!-- Broadcast -->
    <div class="bg-white rounded-2xl shadow p-6 space-y-4">
      <h2 class="text-xl font-semibold text-gray-700">Broadcast to Everyone</h2>
      <input id="allTitle"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"
        type="text" placeholder="Title" />
      <input id="allBody"
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"
        type="text" placeholder="Message" />
      <button onclick="sendToAll()"
        class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2 rounded-lg transition">
        Broadcast
      </button>
    </div>

    <!-- Status Message -->
    <div id="status" class="hidden text-center text-sm font-medium py-3 px-4 rounded-lg"></div>

  </div>

  <script src="main.js"></script>
</body>
</html>
